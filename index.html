<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>RPP Soccer</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<button id="btnCompartilhar">📤 Compartilhar</button>

<div class="pagina card">

    <!-- TOPO -->

    <header class="topo">

        <img src="Logo Rpp.jpg" class="logo-topo" alt="RPP Soccer">

    </header>

    <!-- CABEÇALHO -->

    <section class="cabecalho">

        <img id="fotoAtleta"
             class="foto-atleta"
             alt="Foto do atleta">

        <div class="dados-principais">

            <h1 id="nome"></h1>

            <p id="nascimento"></p>

            <p id="clubeAtual"></p>

        </div>

    </section>

    <!-- LISTA -->

    <section class="informacoes">

        <div class="linha">
            <span>Posição</span>
            <strong id="posicao"></strong>
        </div>

        <div class="linha">
            <span>Cidade</span>
            <strong id="cidade"></strong>
        </div>

        <div class="linha">
            <span>Nacionalidade</span>
            <strong id="nacionalidade"></strong>
        </div>

        <div class="linha">
            <span>Clubes</span>
            <strong id="clubesAntigos"></strong>
        </div>

        <div class="linha">
            <span>Altura</span>
            <strong id="altura"></strong>
        </div>

        <div class="linha">
            <span>Peso</span>
            <strong id="peso"></strong>
        </div>

        <div class="linha">
            <span>Perna</span>
            <strong id="perna"></strong>
        </div>

        <div class="linha">
            <span>Chuteira</span>
            <strong id="chuteira"></strong>
        </div>

        <div class="linha">
            <span>Instagram</span>
            <strong id="instagram"></strong>
        </div>

        <div class="linha">
            <span>Contato</span>
            <strong id="contato"></strong>
        </div>

    </section>

    <!-- SOBRE -->

    <section class="extras">

        <h3>INFORMAÇÕES ADICIONAIS</h3>

        <p id="extras"></p>

    </section>

    <!-- RODAPÉ -->

    <footer class="footer-rpp">

        <img
            src="Logo Rpp.jpg"
            class="footer-logo"
            alt="RPP Soccer">

        <h3>RPP Soccer</h3>

        <p><strong>Ricardo Pereira</strong></p>

        <p>📞 (43) 99668-4799</p>

    </footer>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script src="script.js"></script>

</body>

</html>
